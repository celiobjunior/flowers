<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feliz dia das mulheres</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="page-glow" aria-hidden="true"></div>

    <div class="decor-layer" aria-hidden="true">
      <img class="decor flower flower-a" src="src/decor/flower-blush.svg" alt="" />
      <img class="decor flower flower-b" src="src/decor/flower-coral.svg" alt="" />
      <img class="decor flower flower-c" src="src/decor/flower-garden.svg" alt="" />
      <img class="decor flower flower-d" src="src/decor/flower-blush.svg" alt="" />
      <img class="decor flower flower-e" src="src/decor/flower-coral.svg" alt="" />
      <img class="decor flower flower-f" src="src/decor/flower-garden.svg" alt="" />
      <img class="decor star star-a" src="src/decor/star-butter.svg" alt="" />
      <img class="decor star star-b" src="src/decor/star-sugar.svg" alt="" />
      <img class="decor star star-c" src="src/decor/star-butter.svg" alt="" />
      <img class="decor star star-d" src="src/decor/star-sugar.svg" alt="" />
      <img class="decor star star-e" src="src/decor/star-butter.svg" alt="" />
      <img class="decor star star-f" src="src/decor/star-sugar.svg" alt="" />
    </div>

    <main class="poster">
      <section class="hero">
        <h1 class="headline" aria-label="feliz dia das mulheres" data-title></h1>
      </section>

      <section class="carousel-shell" aria-label="Carrossel de fotos">
        <div class="carousel-mask">
          <div class="carousel-track" data-track></div>
        </div>
        <p class="carousel-status" data-status hidden></p>
      </section>
    </main>

    <script src="src/script.js"></script>
  </body>
</html>
